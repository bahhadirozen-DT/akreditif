name: Akreditif Otomatik Analiz Motoru

on:
  push:
    paths:
      - 'yuklenen_dosyalar/**' # Sadece bu klasöre dosya yüklenince otomatik çalışır!

jobs:
  analiz_et:
    runs-on: ubuntu-latest

    steps:
    - name: Repo Kodlarını Çek
      uses: actions/checkout@v3

    - name: Linux Sunucuya OCR Motorunu Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr tesseract-ocr-tur tesseract-ocr-eng

    - name: Python Ortamını Hazırla
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Sihirli Adım: Klasörün içindeki karmaşık isimli dosyaları akıllıca eşleştirir
    - name: Dosya İsimlerini Otomatik Eşitle
      run: |
        python -c "
        import os, shutil, glob
        
        klasor = 'yuklenen_dosyalar'
        uzantilar = ['*.docx', '*.xlsx', '*.pdf', '*.png', '*.jpg', '*.jpeg', '*.txt']
        
        # Klasördeki tüm dosyaları tara
        tum_dosyalar = []
        for uzanti in uzantilar:
            tum_dosyalar.extend(glob.glob(os.path.join(klasor, uzanti)))
            
        print(f'Saptanan dosyalar: {tum_dosyalar}')
        
        # Akıllı eşleştirme mantığı
        for dosya in tum_dosyalar:
            dosya_adi = os.path.basename(dosya).lower()
            uzanti = os.path.splitext(dosya)[1]
            
            if 'fatura' in dosya_adi or 'invoice' in dosya_adi:
                shutil.copy(dosya, f'yuklenen_dosyalar/fatura{uzanti}')
                print(f'[EŞLEŞTİ] Fatura: {dosya} -> fatura{uzanti}')
            elif 'kusat' in dosya_adi or 'lc' in dosya_adi or 'credit' in dosya_adi or 'swift' in dosya_adi:
                shutil.copy(dosya, f'yuklenen_dosyalar/gelen_kusat{uzanti}')
                print(f'[EŞLEŞTİ] Kuşat: {dosya} -> gelen_kusat{uzanti}')
            elif 'konsimento' in dosya_adi or 'lading' in dosya_adi or 'vessel' in dosya_adi:
                shutil.copy(dosya, f'yuklenen_dosyalar/konsimento{uzanti}')
                print(f'[EŞLEŞTİ] Konşimento: {dosya} -> konsimento{uzanti}')
            elif 'sigorta' in dosya_adi or 'insurance' in dosya_adi:
                shutil.copy(dosya, f'yuklenen_dosyalar/sigorta{uzanti}')
                print(f'[EŞLEŞTİ] Sigorta: {dosya} -> sigorta{uzanti}')
        "

    - name: Yapay Zeka Analiz Motorunu Çalıştır
      run: python kusat_kontrol.py

    - name: Üretilen Uzman Raporlarını Repoya Geri Kaydet
      run: |
        git config --global user.name 'Yapay Zeka Denetçi'
        git config --global user.email 'ai-auditor@github.com'
        git add akreditif_analiz_raporu.md akreditif_analiz_raporu.docx
        git commit -m "🤖 Otomatik Analiz Raporu Güncellendi [skip ci]" || echo "Değişiklik yok."
        git push
