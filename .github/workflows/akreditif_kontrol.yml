name: Akreditif Kusat Kontrol Sistemi

on:
  push:
    paths:
      - 'gelen_kusat.txt'
      - 'fatura.txt'
      - 'konsimento.txt'

jobs:
  analiz_et:
    runs-on: ubuntu-latest

    # Robotun yeni rapor dosyalarını repoya yazabilmesi için gerekli izin
    permissions:
      contents: write

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: Python Ortamını Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Kur
      run: pip install python-docx

    - name: Akreditif Analiz Motorunu Çalıştır
      run: python kusat_kontrol.py

    # Hem Word dosyasını hem de internetten okunacak Liste (Markdown) dosyasını repoya yükler
    - name: Raporları Otomatik Commit ve Push Et
      if: always() # Analizde hata/rezerv çıksa bile rapor dosyalarını yüklemesi için
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Robotu"
        git add akreditif_analiz_raporu.docx akreditif_analiz_raporu.md
        git commit -m "Gelişmiş Çapraz Evrak ve Liste Raporu Güncellendi [skip ci]" || echo "Değişiklik yok"
        git push
