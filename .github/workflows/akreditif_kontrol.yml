name: Akreditif Kusat Kontrol Sistemi
on:
  push:
    paths:
      - 'gelen_kusat.txt'
      - 'fatura.txt'
      - 'konsimento.txt'
      - '.github/workflows/akreditif_kontrol.yml'
jobs:
  analiz_et:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: pip install python-docx
    - run: python kusat_kontrol.py
    - if: always()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Robotu"
        git add akreditif_analiz_raporu.docx akreditif_analiz_raporu.md
        git commit -m "Gelismiş Rapor Guncellendi [skip ci]" || echo "No changes"
        git push
