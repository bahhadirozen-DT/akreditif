name: Akreditif Kusat Kontrol Sistemi

on:
  push:
    paths:
      - 'gelen_kusat.txt'

jobs:
  analiz_et:
    runs-on: ubuntu-latest

    # Repoya dosya yazabilmesi için gerekli yazma izni
    permissions:
      contents: write

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: Python Ortamını Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Kur
      run: pip install python-docx

    - name: Akreditif Analiz Motorunu Çalıştır
      run: python kusat_kontrol.py

    # Üretilen Word dosyasını otomatik olarak repoya kaydeder ve yükler
    - name: Word Raporunu Repoya Commit Et
      if: always() # Hata olsa bile raporu üretip yüklemesi için
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Robotu"
        git add akreditif_analiz_raporu.docx
        git commit -m "Otomatik Word raporu oluşturuldu [skip ci]" || echo "Değişiklik yok"
        git push

