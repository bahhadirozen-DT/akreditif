name: Akreditif Kusat Kontrol Sistemi

on:
  push:
    paths:
      - 'gelen_kusat.txt'
      - 'fatura.txt'
      - 'konsimento.txt'

jobs:
  analiz_et:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: Python Ortamını Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Kur
      run: pip install python-docx

    - name: Akreditif Analiz Motorunu Çalıştır
      run: python kusat_kontrol.py

    - name: Word Raporunu Reponya Commit Et
      if: always()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Robotu"
        git add akreditif_analiz_raporu.docx
        git commit -m "Gelişmiş Çapraz Evrak ve Finans Raporu Oluşturuldu [skip ci]" || echo "Değişiklik yok"
        git push
